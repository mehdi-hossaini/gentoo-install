# vim: set ft=sh ts=4 sw=4 sts=-1 noet:
# This file will be interpreted by /bin/bash.

################################################
# Disk configuration

# Device: Your NVMe Drive (Namespace ID 1)
# Layout: Classic Single Disk (Boot + Swap + Root)
# Filesystem: Ext4 (Stable & Standard)
# Encryption: None

function disk_configuration() {
    create_classic_single_disk_layout swap=8GiB type=efi luks=false root_fs=ext4 /dev/disk/by-id/nvme-HFS001TEJ9X110N_4YD2N030813802S4Q_1
}

################################################
# System configuration

# Hostname
HOSTNAME="gentoo"

# Timezone (Stockholm)
TIMEZONE="Europe/Stockholm"

# Keyboard Layout (Swedish)
# 'se' is the modern standard keymap for Swedish keyboards.
KEYMAP="se"
KEYMAP_INITRAMFS="$KEYMAP"

# Locales (Default English/UTF-8)
LOCALES=""
LOCALE="C.UTF-8"

################################################
# Network configuration

# Enable automatic DHCP networking (Systemd)
SYSTEMD_NETWORKD=true
SYSTEMD_NETWORKD_INTERFACE_NAME="en*"
SYSTEMD_NETWORKD_DHCP=true
SYSTEMD_NETWORKD_ADDRESSES=("192.168.1.100/32" "fd00::1/64")
SYSTEMD_NETWORKD_GATEWAY="192.168.1.1"
SYSTEMD_INITRAMFS_SSHD=false

################################################
# Gentoo configuration

# Sync method: Git (Faster)
PORTAGE_SYNC_TYPE="git"
PORTAGE_GIT_FULL_HISTORY=false
PORTAGE_GIT_MIRROR="https://anongit.gentoo.org/git/repo/sync/gentoo.git"

# Mirror: Official Gentoo Mirror (Reliable)
GENTOO_MIRROR="https://distfiles.gentoo.org"

# Architecture
GENTOO_ARCH="amd64"
GENTOO_SUBARCH=""

# Stage3: Systemd (The "Easy" modern way)
STAGE3_VARIANT="systemd"
STAGE3_BASENAME="stage3-$GENTOO_ARCH-$STAGE3_VARIANT"
STAGE3_BASENAME_CUSTOM=$([[ $STAGE3_VARIANT == *x32* ]] && echo "stage3-$STAGE3_VARIANT" || echo "stage3-$GENTOO_SUBARCH-$STAGE3_VARIANT")
SYSTEMD=$([[ $STAGE3_VARIANT == *systemd* ]] && echo "true" || echo "false")
MUSL=$([[ $STAGE3_VARIANT == *musl* ]] && echo "true" || echo "false")

# Use testing branch (~amd64) for more up-to-date packages
USE_PORTAGE_TESTING=true

# Automatically select best mirrors for future updates
SELECT_MIRRORS=true
SELECT_MIRRORS_LARGE_FILE=false

################################################
# Additional (optional) configuration

# No additional packages requested
ADDITIONAL_PACKAGES=()

# SSHD Disabled (As requested)
ENABLE_SSHD=false

# Binary packages disabled (Default)
ENABLE_BINPKG=false

# Kernel: Binary (The "Easy" way - no compiling)
KERNEL_TYPE=bin

# No SSH keys provided
ROOT_SSH_AUTHORIZED_KEYS=""

################################################
# Prove that you have read the config

I_HAVE_READ_AND_EDITED_THE_CONFIG_PROPERLY=true
